# Run parameters for the benchmark. scripts/run.sh sources this file and
# forwards each as -J<name>=<value>. Override any of these with `-Dprop=val` on
# the JVM, `-Jprop=val` to JMeter, or `key=val` args to run.sh / `bench run`.
#
# Connection settings (ch_host, ch_port, ch_protocol, ch_database) and
# credentials (ch_user, ch_password) live in .env at the repo root (see
# .env.example) — they're environment-specific/secret and stay out of version
# control. .env values override anything set here.

# Concurrency knobs ----------------------------------------------------------
# threads = simultaneous virtual users (one JMeter thread = one in-flight query).
# ramp_up = seconds to reach `threads`. Don't set this to 0 at 40k or the JVM
#           will spawn all threads at once and OOM.
# duration = test wall-clock seconds. loops=-1 means "run until duration ends".
threads=800
ramp_up=10
duration=300
loops=-1

# Inputs / outputs -----------------------------------------------------------
queries_csv=../queries/queries.csv
jtl_path=../results/results.jtl

# Server-side visibility (Python harness only) -------------------------------
# server_monitor = sample ClickHouse system tables (metrics/events/async_metrics)
#                  during the run and pull per-query attribution from
#                  system.query_log afterward. Degrades to client-only if the
#                  benchmark user can't read system tables.
# ch_cluster     = cluster name to aggregate across with clusterAllReplicas().
#                  On ClickHouse Cloud this is `default` (multi-node service
#                  behind one endpoint). Leave blank for a single self-managed
#                  node to read the plain system.* tables.
server_monitor=true
ch_cluster=default
